{{- if .Values.maborak.enabled }}
{{- include "amazon-watcher-stack.backend.validateDatabase" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "amazon-watcher-stack.fullname" . }}-maborak
  labels:
    {{- include "amazon-watcher-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: maborak
  {{- if .Values.argocd.annotations }}
  annotations:
    {{- include "amazon-watcher-stack.argocd.annotations" . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.maborak.replicas | default 1 }}
  revisionHistoryLimit: {{ .Values.maborak.revisionHistoryLimit | default .Values.global.revisionHistoryLimit | default 10 }}
  selector:
    matchLabels:
      {{- include "amazon-watcher-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: maborak
  template:
    metadata:
      labels:
        {{- include "amazon-watcher-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: maborak
      annotations:
        checksum/env: {{ include "amazon-watcher-stack.backend.envChecksum" . }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "amazon-watcher-stack.fullname" . }}
      {{- end }}
      containers:
        - name: maborak
          image: {{ include "amazon-watcher-stack.backend.image-dev" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          workingDir: /app
          command: ["/bin/sh", "-c"]
          args: ["sleep infinity"]
          env:
            {{- include "amazon-watcher-stack.backend.computedEnv" . | nindent 12 }}
          resources:
            {{- toYaml (.Values.maborak.resources | default .Values.backend.resources) | nindent 12 }}
          {{- if .Values.global.storage.enabled }}
          volumeMounts:
            - name: shared-storage
              mountPath: {{ .Values.backend.env.APT_BACKEND_SCREENSHOT_STORAGE_PATH | default "/var/screenshots" }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.global.storage.enabled }}
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: {{ include "amazon-watcher-stack.fullname" . }}-storage
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
