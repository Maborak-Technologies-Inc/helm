{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amazon-watcher-stack.fullname" . }}-redis-secret
  labels:
    {{- include "amazon-watcher-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
data:
  redis-password: {{ (.Values.secrets.redisPassword | default .Values.redis.password) | b64enc | quote }}
{{- end }}
