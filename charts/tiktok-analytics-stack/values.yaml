# TikTok Listener Worker Configuration
worker:
  enabled: true
  replicas: 1
  command: "python cli.py system tiktok run-listener"
  resources:
    limits:
      memory: 1Gi
      cpu: 1000m
    requests:
      memory: 256Mi
      cpu: 200m
  networkPolicy:
    enabled: true
    allowed: ["192.168.0.0/24"]

# UI Service Configuration
