# Default values for tiktok-analytics-stack
# This is a YAML-formatted file.

nameOverride: "tiktok"
fullnameOverride: ""

# Global configuration
imagePullSecrets:
  - name: apt-docker-server

global:
  context: tiktok-analytics
  domain:
    ui: "ui.tiktok.local" # UI domain - Required for ingress
    backend: "api.tiktok.local" # Backend domain - Required for ingress
  # Global HPA override (empty = use individual service settings, true/false = override all)
  hpa: true
  # Global rollout configuration
  revisionHistoryLimit: 3
  # Global persistent storage (not strictly required since screenshot service/PVC was removed)
  storage:
    enabled: false
    storageClassName: "nfs-client"
    size: 10Gi
    accessModes:
      - ReadWriteMany

# Database Configuration
database:
  enabled: true
  postgres:
    version: "16-alpine"
    db: tiktok
    user: postgres
    password: tiktok_postgres_password
    port: 5432
    dataPath: /var/lib/postgresql/data/pgdata
  storage:
    storageClassName: "" # Keep empty to match default storage class
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  pvcRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  resources:
    limits:
      memory: 1Gi
      cpu: 1000m
    requests:
      memory: 512Mi
      cpu: 500m
  healthCheck:
    enabled: true
    intervalSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5
    initialDelaySeconds: 10
  networkPolicy:
    enabled: true

# Redis Configuration
redis:
  enabled: true
  version: "7-alpine"
  password: "tiktok_redis_password"
  port: 6379
  db: 0
  storage:
    storageClassName: ""
    size: 2Gi
    accessModes:
      - ReadWriteOnce
  pvcRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
  config:
    maxmemory: "384mb"
    maxmemory-policy: "noeviction"
    appendonly: "yes"
    appendfsync: "everysec"
  healthCheck:
    enabled: true
    intervalSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5
    initialDelaySeconds: 5
  networkPolicy:
    enabled: true

# Backend Service Configuration
