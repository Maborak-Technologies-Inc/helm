# Istio Service Mesh Configuration
istio:
  enabled: false
  virtualService:
    enabled: false
  destinationRule:
    enabled: false
  telemetry:
    enabled: false

# Kubernetes Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  tls:
    enabled: false

# Secrets (sensitive values)
secrets:
  databasePassword: ""
  redisPassword: ""
  jwtSecret: ""

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  runAsUser: 1000

# Security Context
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

# Node Selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Annotations
podAnnotations: {}

# Labels
podLabels: {}

