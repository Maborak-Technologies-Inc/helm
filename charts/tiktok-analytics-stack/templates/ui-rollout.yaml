{{- if .Values.ui.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "tiktok-analytics-stack.fullname" . }}-ui
  labels:
    {{- include "tiktok-analytics-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  {{- if .Values.argocd.annotations }}
  annotations:
    {{- include "tiktok-analytics-stack.argocd.annotations" . | nindent 4 }}
  {{- end }}
spec:
  {{- $hpaEnabled := .Values.ui.autoscaling.enabled }}
  {{- if ne (printf "%v" .Values.global.hpa) "" }}
    {{- $hpaEnabled = .Values.global.hpa }}
  {{- end }}
  {{- if eq (printf "%v" .Values.ui.autoscaling.enabled) "false" }}
    {{- $hpaEnabled = false }}
  {{- end }}
  {{- if not $hpaEnabled }}
  replicas: {{ .Values.ui.replicas }}
  {{- else if .Values.ui.autoscaling.minReplicas }}
  replicas: {{ .Values.ui.autoscaling.minReplicas }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.ui.rollout.revisionHistoryLimit | default .Values.global.revisionHistoryLimit | default 10 }}
  {{- if .Values.ui.rollout.progressDeadlineSeconds }}
  progressDeadlineSeconds: {{ .Values.ui.rollout.progressDeadlineSeconds }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tiktok-analytics-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "tiktok-analytics-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
      annotations:
        checksum/env: {{ include "tiktok-analytics-stack.ui.envChecksum" . }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        fsGroup: 101
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "tiktok-analytics-stack.fullname" . }}
      {{- end }}
      initContainers:
        - name: init-nginx-cache
          image: alpine:3.20
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /var/cache/nginx/client_temp
              mkdir -p /var/cache/nginx/proxy_temp
              mkdir -p /var/cache/nginx/fastcgi_temp
              mkdir -p /var/cache/nginx/uwsgi_temp
              mkdir -p /var/cache/nginx/scgi_temp
              chown -R 101:101 /var/cache/nginx
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
      containers:
        - name: ui
          image: {{ include "tiktok-analytics-stack.ui.image" . }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            - name: VITE_API_BASE_URL
              value: {{ .Values.ui.env.VITE_API_BASE_URL | default (printf "//%s" .Values.global.domain.backend) | quote }}
            {{- include "tiktok-analytics-stack.ui.env" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          {{- if .Values.ui.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.ui.healthCheck.path }}
              port: 80
            initialDelaySeconds: {{ .Values.ui.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.ui.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.ui.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.ui.healthCheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.ui.healthCheck.path }}
              port: 80
            initialDelaySeconds: {{ .Values.ui.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.ui.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.ui.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.ui.healthCheck.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: nginx-cache
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.ui.rollout.strategy }}
  strategy:
    {{- toYaml .Values.ui.rollout.strategy | nindent 4 }}
  {{- else }}
  strategy:
    canary:
      steps: []
  {{- end }}
{{- end }}
