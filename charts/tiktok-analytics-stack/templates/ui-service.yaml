{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tiktok-analytics-stack.ui.serviceName" . }}
  labels:
    {{- include "tiktok-analytics-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tiktok-analytics-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
{{- end }}
