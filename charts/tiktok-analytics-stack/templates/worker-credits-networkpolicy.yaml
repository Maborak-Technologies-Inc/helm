{{- if and .Values.workerCredits.enabled .Values.workerCredits.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tiktok-analytics-stack.fullname" . }}-worker-credits
  labels:
    {{- include "tiktok-analytics-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-credits
  {{- if .Values.argocd.annotations }}
  annotations:
    {{- include "tiktok-analytics-stack.argocd.annotations" . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "tiktok-analytics-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-credits
  policyTypes:
    - Egress
  {{- if .Values.workerCredits.networkPolicy.egress }}
  egress:
    {{- toYaml .Values.workerCredits.networkPolicy.egress | nindent 4 }}
  {{- else }}
  egress:
    # Allow egress to any destination and port (external APIs, WebSockets, external DB, Redis, etc.)
    - {}
  {{- end }}
{{- end }}
