{{- if and .Values.backend.enabled .Values.secrets.jwtSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tiktok-analytics-stack.fullname" . }}-backend-secret
  labels:
    {{- include "tiktok-analytics-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
data:
  jwt-secret: {{ (.Values.secrets.jwtSecret | default "") | b64enc | quote }}
{{- end }}
