{{- if and .Values.backend.enabled .Values.backend.rollout.strategy.canary }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "tiktok-analytics-stack.backend.analysisTemplateName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tiktok-analytics-stack.labels" . | nindent 4 }}
spec:
  metrics:
  - name: health-check
    interval: 30s
    successCondition: result.statusCode == 200
    failureLimit: 3
    count: 3
    provider:
      web:
        url: "http://{{ include "tiktok-analytics-stack.backend.canaryServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.env.PHOVEU_BACKEND_UVI_PORT | default "9020" }}{{ .Values.backend.healthCheck.path | default "/health" }}"
        headers:
        - key: Content-Type
          value: application/json
{{- end }}
