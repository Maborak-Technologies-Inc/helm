{{- if .Values.worker.enabled }}
{{- include "tiktok-analytics-stack.backend.validateDatabase" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tiktok-analytics-stack.fullname" . }}-worker
  labels:
    {{- include "tiktok-analytics-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- if .Values.argocd.annotations }}
  annotations:
    {{- include "tiktok-analytics-stack.argocd.annotations" . | nindent 4 }}
  {{- end }}
spec:
  {{- $hpaEnabled := .Values.worker.autoscaling.enabled }}
  {{- if ne (printf "%v" .Values.global.hpa) "" }}
    {{- $hpaEnabled = .Values.global.hpa }}
  {{- end }}
  {{- if eq (printf "%v" .Values.worker.autoscaling.enabled) "false" }}
    {{- $hpaEnabled = false }}
  {{- end }}
  {{- if not $hpaEnabled }}
  replicas: {{ .Values.worker.replicas | default 1 }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.global.revisionHistoryLimit | default 10 }}
  selector:
    matchLabels:
      {{- include "tiktok-analytics-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "tiktok-analytics-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/env: {{ include "tiktok-analytics-stack.backend.envChecksum" . }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "tiktok-analytics-stack.fullname" . }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "tiktok-analytics-stack.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          workingDir: /app
          command: ["/bin/sh", "-c"]
          args: [{{ .Values.worker.command | quote }}]
          env:
            {{- include "tiktok-analytics-stack.backend.computedEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
