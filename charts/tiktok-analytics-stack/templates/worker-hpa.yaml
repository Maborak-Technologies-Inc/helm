{{- $hpaEnabled := .Values.worker.autoscaling.enabled }}
{{- if ne (printf "%v" .Values.global.hpa) "" }}
  {{- $hpaEnabled = .Values.global.hpa }}
{{- end }}
{{- if eq (printf "%v" .Values.worker.autoscaling.enabled) "false" }}
  {{- $hpaEnabled = false }}
{{- end }}
{{- if and .Values.worker.enabled $hpaEnabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "tiktok-analytics-stack.fullname" . }}-worker
  labels:
    {{- include "tiktok-analytics-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- if .Values.argocd.annotations }}
  annotations:
    {{- include "tiktok-analytics-stack.argocd.annotations" . | nindent 4 }}
  {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tiktok-analytics-stack.fullname" . }}-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.worker.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- if .Values.worker.autoscaling.behavior }}
  behavior:
    {{- toYaml .Values.worker.autoscaling.behavior | nindent 4 }}
  {{- end }}
{{- end }}
